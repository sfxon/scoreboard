<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Charm Animation</title>
    <style>
        :root {
            --bg-color: #d1d5f0;
            --charm-color: #ffffff;
            --border-color: #2b1d52;
            --blush-color: #ffb1c1;
            --heart-color: #ff7e8e;
            --glow-color: #fff9c4;
        }

        body {
            background: linear-gradient(to bottom, #cbd2f1, #e8eaf6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Der leuchtende Hintergrund */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--glow-color);
            border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
            filter: blur(20px);
            animation: rotateGlow 10s linear infinite;
            opacity: 0.7;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* charm Körper */
        .charm {
            width: 200px;
            height: 160px;
            background: var(--charm-color);
            border: 6px solid var(--border-color);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            position: relative;
            z-index: 2;
            box-shadow: inset -10px -10px 0px rgba(0,0,0,0.05);
            animation: bounce 3s ease-in-out infinite;
        }

        /* Augen */
        .eye {
            position: absolute;
            background: var(--border-color);
        }

        .eye.left {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            top: 60px;
            left: 45px;
        }

        /* Glanzpunkt im Auge */
        .eye.left::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }

        /* Zwinkern (Rechtes Auge) */
        .eye.right {
            width: 30px;
            height: 15px;
            background: transparent;
            border-bottom: 6px solid var(--border-color);
            border-radius: 0 0 50% 50%;
            top: 60px;
            right: 45px;
        }

        /* Mund */
        .mouth {
            position: absolute;
            width: 15px;
            height: 10px;
            border-bottom: 4px solid var(--border-color);
            border-radius: 0 0 50% 50%;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Wangen */
        .blush {
            position: absolute;
            width: 35px;
            height: 18px;
            background: var(--blush-color);
            border-radius: 50%;
            top: 95px;
            opacity: 0.8;
        }

        .blush.left { left: 25px; }
        .blush.right { right: 25px; }

        /* Herzen Animation */
        .heart {
            position: absolute;
            background: var(--heart-color);
            width: 20px;
            height: 20px;
            transform: rotate(-45deg);
            z-index: 1;
            animation: float 4s ease-in-out infinite;
        }

        .heart::before, .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--heart-color);
            border-radius: 50%;
        }

        .heart::before { top: -10px; left: 0; }
        .heart::after { left: 10px; top: 0; }

        /* Positionen der Herzen */
        .h1 { top: -40px; left: -20px; animation-delay: 0s; }
        .h2 { top: 20px; right: -50px; animation-delay: 1s; transform: rotate(-30deg) scale(0.8); }
        .h3 { bottom: 20px; left: -60px; animation-delay: 2s; transform: rotate(-60deg) scale(0.6); }

        /* Ein Herz als eckiges Beispiel */
        .h1.heart::before, .h1.heart::after { border-radius: 0; }

        /* Animationen */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02, 0.98); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-45deg); }
            50% { transform: translateY(-20px) rotate(-35deg); }
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glow"></div>
    
    <div class="heart h1"></div>
    <div class="heart h2"></div>
    <div class="heart h3"></div>

    <div class="charm">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
    </div>
</div>
</body>
</html>
